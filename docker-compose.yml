services:
  postgres:
    image: postgres:16-alpine
    container_name: csv_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: csv
      POSTGRES_PASSWORD: csv
      POSTGRES_DB: csv
    ports:
      - '5433:5432'
    volumes:
      - csv_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U csv']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  csv_postgres_data:
