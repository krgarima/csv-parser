services:
  - type: web
    name: csv-api
    runtime: node
    rootDir: server
    plan: free
    region: oregon
    # --include=dev forces devDependencies (typescript, @types/node, prisma CLI)
    # to install even though NODE_ENV=production is set. Runtime uses node directly,
    # so devDeps aren't needed after the build completes.
    buildCommand: npm ci --include=dev && npx prisma generate && npm run build && npx prisma migrate deploy
    startCommand: node dist/index.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: DATABASE_URL
        sync: false
      - key: ACCESS_TOKEN_SECRET
        generateValue: true
      - key: REFRESH_TOKEN_SECRET
        generateValue: true
      - key: ACCESS_TOKEN_TTL
        value: 15m
      - key: REFRESH_TOKEN_TTL
        value: 7d
      - key: CORS_ORIGIN
        sync: false
      - key: COOKIE_DOMAIN
        sync: false
      - key: LLM_PROVIDER
        value: gemini
      - key: LLM_API_KEY
        sync: false
      - key: LLM_MODEL
        value: gemini-2.5-flash
      - key: MAX_UPLOAD_BYTES
        value: 10485760
      - key: MAX_ROWS
        value: 50000
      - key: CHART_CAP_PER_USER
        value: 3
